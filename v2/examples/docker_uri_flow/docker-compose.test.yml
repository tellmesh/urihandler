services:
  python-worker:
    build:
      context: ./python-worker
    image: urirun-v2-python-worker:local
    networks: [uri-flow]

  node-worker:
    build:
      context: ./node-worker
    image: urirun-v2-node-worker:local
    networks: [uri-flow]

  shell-worker:
    build:
      context: ./shell-worker
    image: urirun-v2-shell-worker:local
    environment:
      REPORT_DIR: /tmp
    networks: [uri-flow]

  tester:
    build:
      context: ../../..
      dockerfile: v2/examples/docker_uri_flow/tester/Dockerfile
    image: urirun-v2-flow-tester:local
    depends_on:
      - python-worker
      - node-worker
      - shell-worker
    networks: [uri-flow]

networks:
  uri-flow:
