task:
  id: docker-cross-service-report
  description: Compose flow that lets Python, Node.js and shell containers exchange URI-addressed resources.

steps:
  - id: normalize_text
    uri: python://python-worker/text/normalize
    operation: normalize
    kind: command
    payload:
      text: "Supplier Report June 2026"

  - id: slugify_text
    uri: node://node-worker/text/slugify
    operation: slugify
    kind: command
    depends_on:
      - normalize_text
    payload:
      text_from: normalize_text.result.normalized

  - id: write_report
    uri: shell://shell-worker/report/write
    operation: write
    kind: command
    depends_on:
      - slugify_text
    payload:
      slug_from: slugify_text.result.slug
      text_from: normalize_text.result.normalized

  - id: summarize_report
    uri: python://python-worker/report/summary
    operation: summarize
    kind: query
    depends_on:
      - write_report
    payload:
      path_from: write_report.result.path
